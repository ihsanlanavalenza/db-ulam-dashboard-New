name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package/backend
          mkdir -p deploy-package/backend/tmp

          # Frontend build is served from dashboard-mbu root.
          cp -R frontend/build/. deploy-package/

          # Backend runtime files for cPanel Node.js app.
          cp -R backend/config deploy-package/backend/
          cp -R backend/controllers deploy-package/backend/
          cp -R backend/middleware deploy-package/backend/
          cp -R backend/routes deploy-package/backend/
          cp -R backend/utils deploy-package/backend/
          cp backend/server.js deploy-package/backend/
          cp backend/package.json deploy-package/backend/
          cp backend/package-lock.json deploy-package/backend/
          cp backend/.env.example deploy-package/backend/

          # Trigger Passenger restart on cPanel after upload.
          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy-package/backend/tmp/restart.txt

      - name: Normalize FTP server host
        id: ftp_host
        run: |
          raw='${{ secrets.FTP_SERVER }}'
          clean=$(printf '%s' "$raw" | tr -d '\r\n' | sed -E 's#^[[:space:]]+##; s#[[:space:]]+$##; s#^ftps?://##; s#^https?://##; s#/.*$##')

          if [ -z "$clean" ]; then
            echo "FTP_SERVER secret is empty after normalization."
            exit 1
          fi

          host="$clean"
          parsed_port=""

          # If user provided host:port, split it so DNS validation works.
          if printf '%s' "$clean" | grep -Eq '^[^:]+:[0-9]+$'; then
            host="${clean%%:*}"
            parsed_port="${clean##*:}"
          fi

          # cPanel web login ports are not FTP ports.
          if [ "$parsed_port" = "2082" ] || [ "$parsed_port" = "2083" ]; then
            echo "Detected cPanel web port ($parsed_port); using FTP default port instead."
            parsed_port=""
          fi

          echo "value=$host" >> "$GITHUB_OUTPUT"
          echo "parsed_port=$parsed_port" >> "$GITHUB_OUTPUT"

      - name: Resolve FTP options
        id: ftp_options
        run: |
          protocol='${{ secrets.FTP_PROTOCOL }}'
          protocol=$(printf '%s' "$protocol" | tr '[:upper:]' '[:lower:]' | tr -d '\r\n ')
          if [ "$protocol" != "ftp" ] && [ "$protocol" != "ftps" ]; then
            protocol="ftp"
          fi

          port='${{ secrets.FTP_PORT }}'
          port=$(printf '%s' "$port" | tr -d '\r\n ')
          if ! printf '%s' "$port" | grep -Eq '^[0-9]+$'; then
            if [ -n '${{ steps.ftp_host.outputs.parsed_port }}' ]; then
              port='${{ steps.ftp_host.outputs.parsed_port }}'
            else
              port="21"
            fi
          fi

          target="/public_html/dashboard-mbu/"

          echo "protocol=$protocol" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Validate FTP host DNS
        run: |
          host='${{ steps.ftp_host.outputs.value }}'
          echo "Validating DNS for FTP host: $host"
          if ! getent ahosts "$host" >/dev/null 2>&1; then
            echo "Cannot resolve FTP host: $host"
            echo "Set FTP_SERVER to a valid hostname or IP (without ftp://, https://, or path)."
            exit 1
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp_host.outputs.value }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ steps.ftp_options.outputs.protocol }}
          port: ${{ steps.ftp_options.outputs.port }}
          local-dir: ./deploy-package/
          server-dir: ${{ steps.ftp_options.outputs.target }}
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/README.md
            **/*.md
            **/.env
            **/.env.*
            **/tests/**
            **/docs/**
            **/migrations/**
            **/.vscode/**
            **/.idea/**
            **/*.log
            **/*.sql
            **/*.sql.gz
            **/tmp/**
            **/temp/**
            **/.DS_Store