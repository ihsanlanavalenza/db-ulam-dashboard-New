name: Deploy to cPanel via SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package/backend/tmp

          # Frontend build is served from dashboard-mbu root.
          cp -R frontend/build/. deploy-package/

          # Backend runtime files for cPanel Node.js app.
          cp -R backend/config deploy-package/backend/
          cp -R backend/controllers deploy-package/backend/
          cp -R backend/middleware deploy-package/backend/
          cp -R backend/routes deploy-package/backend/
          cp -R backend/utils deploy-package/backend/
          cp backend/server.js deploy-package/backend/
          cp backend/package.json deploy-package/backend/
          cp backend/package-lock.json deploy-package/backend/
          cp backend/.env.example deploy-package/backend/

          # Trigger Passenger restart after upload.
          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy-package/backend/tmp/restart.txt

      - name: Resolve SSH deploy options
        id: ssh_options
        run: |
          raw='${{ secrets.FTP_SERVER }}'
          clean=$(printf '%s' "$raw" | tr -d '\r\n' | sed -E 's#^[[:space:]]+##; s#[[:space:]]+$##; s#^sftp://##; s#^ssh://##; s#^ftps?://##; s#^https?://##; s#/.*$##')

          if [ -z "$clean" ]; then
            echo "FTP_SERVER secret is empty after normalization."
            exit 1
          fi

          host="$clean"
          parsed_port=""

          if printf '%s' "$clean" | grep -Eq '^[^:]+:[0-9]+$'; then
            host="${clean%%:*}"
            parsed_port="${clean##*:}"
          fi

          port='${{ secrets.SFTP_PORT }}'
          port=$(printf '%s' "$port" | tr -d '\r\n ')
          if ! printf '%s' "$port" | grep -Eq '^[0-9]+$'; then
            if [ -n "$parsed_port" ]; then
              port="$parsed_port"
            else
              port="22"
            fi
          fi

          # cPanel web/FTP ports are not SSH/SFTP endpoints.
          if [ "$port" = "2082" ] || [ "$port" = "2083" ] || [ "$port" = "21" ] || [ "$port" = "990" ]; then
            echo "Detected non-SSH port ($port). Forcing SFTP to port 22."
            port="22"
          fi

          target='${{ secrets.SFTP_TARGET_DIR }}'
          target=$(printf '%s' "$target" | tr -d '\r\n' | sed -E 's#^[[:space:]]+##; s#[[:space:]]+$##')
          if [ -z "$target" ]; then
            target="public_html/dashboard-mbu"
          fi
          target="${target%/}"

          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Validate SSH endpoint
        run: |
          host='${{ steps.ssh_options.outputs.host }}'
          port='${{ steps.ssh_options.outputs.port }}'

          echo "Validating SSH endpoint: $host:$port"
          if ! timeout 10 ssh-keyscan -p "$port" "$host" >/dev/null 2>&1; then
            echo "SSH handshake failed on $host:$port"
            echo "Use SSH/SFTP port (usually 22), not cPanel web ports (2082/2083)."
            exit 1
          fi

      - name: Deploy via SCP (SFTP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.ssh_options.outputs.host }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ steps.ssh_options.outputs.port }}
          source: deploy-package/*
          target: ${{ steps.ssh_options.outputs.target }}
          strip_components: 1
          overwrite: true
          rm: true

      - name: Install backend deps and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.ssh_options.outputs.host }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ steps.ssh_options.outputs.port }}
          script_stop: true
          script: |
            set -e
            TARGET_DIR='${{ steps.ssh_options.outputs.target }}'
            if [ "${TARGET_DIR#/}" = "$TARGET_DIR" ]; then
              TARGET_DIR="$HOME/$TARGET_DIR"
            fi

            BACKEND_DIR="$TARGET_DIR/backend"
            if [ ! -d "$BACKEND_DIR" ]; then
              echo "Backend directory not found at $BACKEND_DIR"
              exit 1
            fi

            VENV_ACTIVATE=$(find "$HOME/nodevenv/public_html/dashboard-mbu/backend" -maxdepth 3 -type f -name activate 2>/dev/null | head -n 1 || true)
            if [ -n "$VENV_ACTIVATE" ]; then
              . "$VENV_ACTIVATE"
            fi

            cd "$BACKEND_DIR"
            npm install --omit=dev --no-audit --no-fund
            mkdir -p tmp
            date -u +"%Y-%m-%dT%H:%M:%SZ" > tmp/restart.txt
            echo "Deploy and restart completed"
