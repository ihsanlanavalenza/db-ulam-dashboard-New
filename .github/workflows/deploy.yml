name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci
          npm install axios --no-save

      - name: Verify axios dependency
        working-directory: frontend
        run: |
          npm ls axios
          test -d node_modules/axios

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package

          # Frontend static files are served from web root.
          cp -R frontend/build/. deploy-package/

          # Backend files for Node.js runtime on cPanel.
          mkdir -p deploy-package/backend
          cp -R backend/config deploy-package/backend/
          cp -R backend/controllers deploy-package/backend/
          cp -R backend/middleware deploy-package/backend/
          cp -R backend/routes deploy-package/backend/
          cp -R backend/utils deploy-package/backend/
          cp backend/server.js deploy-package/backend/
          cp backend/package.json deploy-package/backend/
          cp backend/package-lock.json deploy-package/backend/
          cp backend/.env.example deploy-package/backend/

      - name: Normalize FTP server host
        id: ftp_host
        run: |
          raw='${{ secrets.FTP_SERVER }}'
          clean=$(printf '%s' "$raw" | tr -d '\r\n' | sed -E 's#^[[:space:]]+##; s#[[:space:]]+$##; s#^ftps?://##; s#^https?://##; s#/.*$##')

          if [ -z "$clean" ]; then
            echo "FTP_SERVER secret is empty after normalization."
            exit 1
          fi

          host="$clean"
          parsed_port=""

          # If user provided host:port, split it so DNS validation works.
          if printf '%s' "$clean" | grep -Eq '^[^:]+:[0-9]+$'; then
            host="${clean%%:*}"
            parsed_port="${clean##*:}"
          fi

          # cPanel web login ports are not FTP ports.
          if [ "$parsed_port" = "2082" ] || [ "$parsed_port" = "2083" ]; then
            echo "Detected cPanel web port ($parsed_port); using FTP default port instead."
            parsed_port=""
          fi

          echo "value=$host" >> "$GITHUB_OUTPUT"
          echo "parsed_port=$parsed_port" >> "$GITHUB_OUTPUT"

      - name: Validate FTP host DNS
        run: |
          host='${{ steps.ftp_host.outputs.value }}'
          echo "Validating DNS for FTP host: $host"
          if ! getent ahosts "$host" >/dev/null 2>&1; then
            echo "Cannot resolve FTP host: $host"
            echo "Set FTP_SERVER to a valid hostname or IP (without ftp://, https://, or path)."
            exit 1
          fi

      - name: Deploy via FTP (primary)
        id: deploy_primary
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp_host.outputs.value }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          port: ${{ secrets.FTP_PORT || steps.ftp_host.outputs.parsed_port || 21 }}
          local-dir: ./deploy-package/
          server-dir: /public_html/
          dangerous-clean-slate: true
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/README.md
            **/*.md
            **/.env
            **/.env.*
            **/tests/**
            **/docs/**
            **/migrations/**
            **/.vscode/**
            **/.idea/**
            **/*.log
            **/*.sql
            **/*.sql.gz
            **/tmp/**
            **/temp/**
            **/.DS_Store

      - name: Deploy via FTPS fallback (port 990)
        id: deploy_fallback
        if: steps.deploy_primary.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp_host.outputs.value }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 990
          local-dir: ./deploy-package/
          server-dir: /public_html/
          dangerous-clean-slate: true
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/README.md
            **/*.md
            **/.env
            **/.env.*
            **/tests/**
            **/docs/**
            **/migrations/**
            **/.vscode/**
            **/.idea/**
            **/*.log
            **/*.sql
            **/*.sql.gz
            **/tmp/**
            **/temp/**
            **/.DS_Store

      - name: Verify deploy result
        if: always()
        run: |
          echo "Primary outcome=${{ steps.deploy_primary.outcome }}, conclusion=${{ steps.deploy_primary.conclusion }}"
          echo "Fallback outcome=${{ steps.deploy_fallback.outcome }}, conclusion=${{ steps.deploy_fallback.conclusion }}"

          if [ '${{ steps.deploy_primary.conclusion }}' = 'success' ] || [ '${{ steps.deploy_primary.outcome }}' = 'success' ]; then
            echo "Primary deploy succeeded"
            exit 0
          fi

          if [ '${{ steps.deploy_fallback.conclusion }}' = 'success' ] || [ '${{ steps.deploy_fallback.outcome }}' = 'success' ]; then
            echo "Fallback deploy succeeded"
            exit 0
          fi

          echo "Deploy failed in both primary and fallback attempts."
          exit 1